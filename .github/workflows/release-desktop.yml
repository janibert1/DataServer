name: Release Desktop Client

on:
  push:
    tags:
      - 'desktop/v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: desktop/go.sum

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            gcc-aarch64-linux-gnu

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/desktop/v}" >> $GITHUB_OUTPUT

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
          workdir: desktop
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-macos:
    runs-on: macos-latest
    needs: release
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: desktop/go.sum

      - name: Build macOS binaries
        working-directory: desktop
        run: |
          # Build for both architectures
          GOOS=darwin GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o dataserver-amd64 .
          GOOS=darwin GOARCH=arm64 go build -trimpath -ldflags="-s -w" -o dataserver-arm64 .

          # Create universal binary
          lipo -create -output dataserver dataserver-amd64 dataserver-arm64

          # Package
          tar czf dataserver-desktop_darwin_universal.tar.gz dataserver

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/desktop/v}" >> $GITHUB_OUTPUT

      - name: Upload macOS universal binary
        uses: softprops/action-gh-release@v2
        with:
          files: desktop/dataserver-desktop_darwin_universal.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
