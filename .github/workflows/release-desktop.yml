name: Release Desktop Client

on:
  push:
    tags:
      - 'desktop/v*'

permissions:
  contents: write

jobs:
  release-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: desktop/go.sum

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libayatana-appindicator3-dev libgtk-3-dev

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
          workdir: desktop
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: desktop/go.sum

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/desktop/v}" >> $GITHUB_OUTPUT

      - name: Build macOS binaries
        working-directory: desktop
        run: |
          GOOS=darwin GOARCH=amd64 CGO_ENABLED=1 go build -trimpath -ldflags="-s -w" -o dataserver-amd64 .
          GOOS=darwin GOARCH=arm64 CGO_ENABLED=1 go build -trimpath -ldflags="-s -w" -o dataserver-arm64 .
          lipo -create -output dataserver dataserver-amd64 dataserver-arm64
          tar czf "dataserver-desktop_${{ steps.version.outputs.version }}_darwin_universal.tar.gz" dataserver

      - name: Upload macOS binary to release
        uses: softprops/action-gh-release@v2
        with:
          files: desktop/dataserver-desktop_${{ steps.version.outputs.version }}_darwin_universal.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
