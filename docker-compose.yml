version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: dataserver_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dataserver}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dataserver_secret}
      POSTGRES_DB: ${POSTGRES_DB:-dataserver}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dataserver}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: dataserver_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret} --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD:-redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: dataserver_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio_secret_key}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 20s
      retries: 3

  clamav:
    image: clamav/clamav:latest
    container_name: dataserver_clamav
    restart: unless-stopped
    ports:
      - "3310:3310"
    volumes:
      - clamav_data:/var/lib/clamav
    environment:
      CLAMAV_NO_FRESHCLAMD: "false"
      CLAMAV_NO_MILTERD: "true"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dataserver_backend
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-dataserver}:${POSTGRES_PASSWORD:-dataserver_secret}@postgres:5432/${POSTGRES_DB:-dataserver}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379
      S3_ENDPOINT: http://minio:9000
      CLAMAV_HOST: clamav
      CLAMAV_PORT: "3310"
      PORT: "4000"
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${FRONTEND_API_URL:-/api}
    container_name: dataserver_frontend
    restart: unless-stopped
    ports:
      - "3005:80"
    depends_on:
      - backend

  tailscale:
    image: tailscale/tailscale:latest
    container_name: dataserver_tailscale
    restart: unless-stopped
    hostname: dataserver
    environment:
      TS_AUTHKEY: ${TAILSCALE_AUTHKEY}
      TS_SERVE_CONFIG: /config/serve.json
      TS_STATE_DIR: /var/lib/tailscale
    volumes:
      - tailscale_data:/var/lib/tailscale
      - ./tailscale:/config
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    depends_on:
      - frontend

volumes:
  postgres_data:
  redis_data:
  minio_data:
  clamav_data:
  tailscale_data:
